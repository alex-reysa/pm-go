services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: pmgo
      POSTGRES_PASSWORD: pmgo
      POSTGRES_DB: pm_go
    ports:
      - "5432:5432"
    volumes:
      - pmgo_postgres:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pmgo -d pm_go"]
      interval: 5s
      retries: 10

  temporal:
    image: temporalio/auto-setup:1.27.0
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: pmgo
      POSTGRES_PWD: pmgo
      POSTGRES_SEEDS: postgres
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "7233:7233"

  temporal-ui:
    image: temporalio/ui:2.33.0
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000
    depends_on:
      - temporal
    ports:
      - "8233:8080"

volumes:
  pmgo_postgres: {}
