name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck-test:
    name: typecheck + test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      # TODO(v0.7.1): restore a real lint gate here. The previous
      # `pnpm lint` step was a no-op — `pnpm -r --if-present lint`
      # found no `lint` script in any workspace package, exited 0,
      # and gave false confidence. Removed rather than leave a
      # cosmetic-green check in the pipeline. Re-add once ESLint
      # (or equivalent) is configured at the repo level.

      - name: Test
        run: pnpm test

  smoke-stub:
    name: smoke (stub matrix + chaos)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure git identity (required by worktree tests)
        run: |
          git config --global user.email "ci@pm-go.test"
          git config --global user.name "pm-go ci"

      - name: phase7-matrix smoke
        run: pnpm smoke:phase7-matrix

      - name: phase7-chaos smoke
        run: pnpm smoke:phase7-chaos
